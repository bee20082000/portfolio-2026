<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Huy Nguyen — Creative Designer</title>
  <meta name="description"
    content="Huy Nguyen — Creative Designer crafting immersive digital experiences, interfaces, and visual identities." />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.svg" />

  <!-- Open Graph -->
  <meta property="og:title" content="Huy Nguyen — Creative Designer" />
  <meta property="og:description" content="Creative Designer crafting immersive digital experiences, interfaces, and visual identities." />
  <meta property="og:type" content="website" />

  <!-- Preload primary body fonts to eliminate CLS from font swap -->
  <link rel="preload" href="/src/assets/fonts/Install-Rounded-Regular.woff" as="font" type="font/woff" crossorigin />
  <link rel="preload" href="/src/assets/fonts/Install-Rounded-Semibold.woff" as="font" type="font/woff" crossorigin />
  <link rel="preload" href="/src/assets/fonts/Pardon-4x4.subset.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/src/assets/fonts/Maroni-Condensed.otf" as="font" type="font/otf" crossorigin />


</head>

<body>
  <div id="root">
    <style>
      body {
        margin: 0;
        background-color: #13131A;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #13131A;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      #initial-loader .loading-inner {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
      }
      #initial-loader .counter-container {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #FFFFFF;
        font-family: 'Pardon 4x4', monospace;
        font-size: 1.25rem;
        line-height: 1;
      }
      #initial-loader .counter-number {
        font-variant-numeric: tabular-nums;
        min-width: 2.8em;
        text-align: center;
        letter-spacing: -0.05em;
        user-select: none;
      }
    </style>
    <div id="initial-loader">
      <div class="loading-inner">
        <div class="counter-container">
          <span class="counter-number">1</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
