<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Huy Nguyen — Creative Designer</title>
  <meta name="description" content="Huy Nguyen — Creative Designer crafting immersive digital experiences, interfaces, and visual identities." />

  <!-- DNS prefetch + preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Preload primary body fonts to eliminate CLS from font swap -->
  <link rel="preload" href="/src/assets/fonts/Install-Rounded-Regular.woff" as="font" type="font/woff" crossorigin />
  <link rel="preload" href="/src/assets/fonts/Install-Rounded-Semibold.woff" as="font" type="font/woff" crossorigin />

  <!-- Google Fonts loaded async — avoids render-blocking for FCP -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nothing+You+Could+Do&family=Shadows+Into+Light+Two&display=swap" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nothing+You+Could+Do&family=Shadows+Into+Light+Two&display=swap" />
  </noscript>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
